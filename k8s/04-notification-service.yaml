apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: currency-broker
spec:
  replicas: 2
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
    spec:
      containers:
        - name: notification-service
          image: <your-dockerhub-username>/notification-service:1.0
          ports:
            - containerPort: 8082
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: notification_db
            - name: DB_USER
              value: postgres
            - name: DB_PASS
              value: postgres
            - name: KAFKA_BROKER
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: currency-broker
spec:
  selector: { app: notification-service }
  ports:
    - port: 8082
  type: NodePort